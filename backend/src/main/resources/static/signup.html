<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>smart_farming | Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #065f46; --glass: rgba(255, 255, 255, 0.85); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background: url('assets/hero.png') no-repeat center center/cover; position: relative;
        }
        body::before { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.4); }
        
        .signup-container {
            position: relative; background: var(--glass); backdrop-filter: blur(20px);
            padding: 40px; border-radius: 32px; width: 100%; max-width: 550px;
            animation: fadeIn 0.8s ease-out; border: 1px solid rgba(255,255,255,0.3);
            max-height: 90vh; overflow-y: auto;
        }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        h1 { font-size: 2rem; color: var(--primary); text-align: center; margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.8rem; color: #4b5563; }
        input, select { 
            width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 12px; 
            outline: none; transition: 0.3s; background: rgba(255,255,255,0.9);
        }
        input:focus { border-color: var(--primary); }
        .btn-signup { 
            width: 100%; padding: 16px; background: var(--primary); color: white; 
            border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 10px;
        }
        .footer { text-align: center; margin-top: 20px; font-size: 0.9rem; }
        .footer a { color: var(--primary); text-decoration: none; font-weight: 700; }
        .error { color: #d32f2f; background: #ffebee; padding: 10px; border-radius: 8px; margin-bottom: 20px; display: none; text-align: center; }
    </style>
</head>
<body>
    <div class="signup-container">
        <h1>Join smart_farming</h1>
        <p style="text-align:center; margin-bottom:20px; color:#666;">Provide your details to register as a Farmer or Expert</p>
        <div id="errorBox" class="error"></div>
        
        <form id="signupForm">
            <div class="form-grid">
                <div class="input-group">
                    <label>Full Legal Name</label>
                    <input type="text" id="sFullName" placeholder="e.g. Fidela Mudahemuka" required>
                </div>
                <div class="input-group">
                    <label>Contact Number</label>
                    <input type="text" id="sContact" placeholder="e.g. 0782299538" required>
                </div>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="sEmail" placeholder="yourname@domain.com" required>
            </div>

            <div class="form-grid">
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="sPassword" placeholder="••••••••" required>
                </div>
                <div class="input-group">
                    <label>Location / Province</label>
                    <input type="text" id="sLocation" placeholder="e.g. Kigali, Rwanda" required>
                </div>
            </div>

            <div class="form-grid" id="extraFields">
                <div class="input-group">
                    <label>Specialization (for Experts)</label>
                    <input type="text" id="sSpecial" placeholder="e.g. Crop Pathology">
                </div>
                <div class="input-group">
                    <label>Company (for Dealers)</label>
                    <input type="text" id="sCompany" placeholder="e.g. Rwanda Agro Ltd">
                </div>
            </div>

            <div class="input-group">
                <label>Identify as</label>
                <select id="sRole">
                    <option value="FARMER">Farmer</option>
                    <option value="AGRONOMIST">Agronomist</option>
                    <option value="AGRO_DEALER">Agro Dealer</option>
                </select>
            </div>

            <button type="submit" class="btn-signup" id="signupBtn">Create My Account</button>
            <div id="loader" style="display:none; text-align:center; padding:10px;">Registering Profile...</div>
        </form>
        <div class="footer">
            Already registered? <a href="index.html">Log In</a>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
