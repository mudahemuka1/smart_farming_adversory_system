<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>smart_farming | Verify Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #065f46; --glass: rgba(255, 255, 255, 0.85); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background: url('assets/hero.png') no-repeat center center/cover; position: relative;
        }
        body::before { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.5); }
        
        .verify-container {
            position: relative; background: var(--glass); backdrop-filter: blur(20px);
            padding: 40px; border-radius: 32px; width: 100%; max-width: 480px;
            text-align: center; border: 1px solid rgba(255,255,255,0.3);
        }
        
        h1 { color: var(--primary); margin-bottom: 10px; }
        p { color: #4b5563; margin-bottom: 30px; line-height: 1.6; }
        
        input { 
            width: 100%; padding: 16px; border: 2px solid #ddd; border-radius: 12px; 
            font-size: 1.5rem; text-align: center; letter-spacing: 15px; font-weight: 700;
            margin-bottom: 20px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); }

        .btn-verify { 
            width: 100%; padding: 16px; background: var(--primary); color: white; 
            border: none; border-radius: 12px; font-weight: 700; cursor: pointer;
        }
        .resend { margin-top: 20px; font-size: 0.9rem; color: #6b7280; }
        .resend a { color: var(--primary); text-decoration: none; font-weight: 700; }
        .error { color: #d32f2f; background: #ffebee; padding: 10px; border-radius: 8px; margin-bottom: 20px; display: none; }
        .success { color: #2e7d32; background: #e8f5e9; padding: 10px; border-radius: 8px; margin-bottom: 20px; display: none; }
    </style>
</head>
<body>
    <div class="verify-container">
        <h1>Verify Email</h1>
        <p>A 6-digit code was sent to <br><b id="displayEmail">your email</b>. Please enter it below.</p>
        
        <div id="errorBox" class="error"></div>
        <div id="successBox" class="success"></div>

        <form id="verifyForm">
            <input type="text" id="vCode" placeholder="000000" maxlength="6" required>
            <button type="submit" class="btn-verify" id="verifyBtn">Verify & Activate</button>
        </form>

        <div class="resend">
            Didn't get the code? <a href="#" onclick="resendCode()">Resend Code</a>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
